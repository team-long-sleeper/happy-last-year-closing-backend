name: Claude PR Review (Backend)

on:
    pull_request:
        types: [opened, ready_for_review]
        branches: [dev]

jobs:
    review:
        # 1) draft는 리뷰 안 함
        # 2) PR 제목에 [skip review] 있으면 스킵
        # 3) bot PR 스킵 (Dependabot 등 자동 PR로 비용 새는 거 방지)
        if: |
            github.event.pull_request.draft == false &&
            !contains(github.event.pull_request.title, '[skip review]') &&
            github.event.pull_request.user.type != 'Bot'

        runs-on: ubuntu-latest

        permissions:
            contents: read
            pull-requests: write
            id-token: write

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            # PR 크기 체크 - 너무 크면 스킵
            - name: Check PR size
              id: size_check
              run: |
                  CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' | wc -l)
                  echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT
                    if [ $CHANGED -gt 30 ]; then
                        echo "::warning::PR이 너무 큽니다 ($CHANGED files). 리뷰 스킵."
                        echo "skip=true" >> $GITHUB_OUTPUT
                    else
                        echo "변경된 파일: $CHANGED개"
                    fi

            - name: Claude Code Review
              if: steps.size_check.outputs.skip != 'true'
              uses: anthropics/claude-code-action@v1
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
                  claude_args: |
                      --model claude-sonnet-4-6
                      --max-turns 15
                      --allowedTools "Read,Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"
                  prompt: |
                      REPO: ${{ github.repository }}
                      PR NUMBER: ${{ github.event.pull_request.number }}

                      먼저 `.claude/skills/node-backend-review/SKILL.md` 를 Read 도구로 읽어.
                      리뷰 기준, 심각도 분류, 출력 형식(요약 + ## 치명 / ## 주요 / ## 어드바이스 + Overall),
                      "하지 말 것" 규칙은 모두 그 스킬을 따른다.

                      대상: 변경된 `.ts`, `.js` 파일. 변경 내용은 `gh pr diff` 로 확인.

                      PR 워크플로우 전용 출력 규칙 (스킬에는 없는 부분):
                      - 문제 있는 라인은 반드시 `mcp__github_inline_comment__create_inline_comment` 로 inline comment 작성 (`confirmed: true`)
                      - 전체 리뷰 요약(스킬 출력 형식 그대로)은 `gh pr comment` 로 작성
                      - 문제가 없어도 "리뷰 기준에 해당하는 문제를 찾지 못했습니다." 라는 요약 comment는 남겨

                      한국어로 작성해줘.
