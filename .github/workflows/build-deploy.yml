name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    environment: prod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 이미지 빌드 & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hlyc-backend:latest

      - name: EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hlyc-backend:latest
            docker stop hlyc-backend || true
            docker rm hlyc-backend || true
            docker run -d \
              --name hlyc-backend \
              --restart always \
              -p 4000:4000 \
              --env-file /home/ec2-user/happy-last-year-closing-backend/.env \
              ${{ secrets.DOCKERHUB_USERNAME }}/hlyc-backend:latest
